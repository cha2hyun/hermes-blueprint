# designer — 사람 전용 설정 (설계: hermes-setup-guide.md §5)
# 중위 모델
model:
  default: anthropic/claude-sonnet-4.6

# 읽기·검색·산출물(design/) 작성만 — 터미널·실행 제거
agent:
  disabled_toolsets:
    - terminal
    - code_execution
    - browser
    - vision
    - image_gen
    - tts
    - computer_use
    - messaging
    - cronjob
    - delegation

terminal:
  cwd: /workspace/dev

_config_version: 27
timezone: Asia/Seoul
